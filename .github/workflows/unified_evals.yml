  eval-other:
    needs: prep
    if: needs.prep.outputs.other_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.other_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}
      force_build: ${{ inputs.force_build }}
      harbor_package_override: ${{ inputs.harbor_package_override }}
      include_tasks: ${{ matrix.include_tasks }}

  combine:
    name: "📊 Combine cross-model results"
    needs:
      - prep
      - eval-anthropic
      - eval-baseten
      - eval-fireworks
      - eval-google_genai
      - eval-groq
      - eval-nvidia
      - eval-ollama
      - eval-openai
      - eval-openrouter
      - eval-xai
      - eval-other
    if: ${{ always() }}
    runs-on: ubuntu-latest
    # Every ref publishes to the same branch. Serialize the publishing jobs so
    # each one fetches the branch tip after the previous writer has pushed.
    concurrency:
      group: eval-assets-publication
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      RUN_ID: ${{ github.run_id }}
      ROLLOUTS: ${{ inputs.rollouts }}
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "🐍 Set up Python + UV"
        uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.12"
          cache-suffix: unified-combine
          working-directory: libs/evals

      - name: "⬇️ Download leaf summaries"
        run: |
          attempt=1
          while :; do
            attempt_dir=$(mktemp -d)
            if gh run download "$RUN_ID" --repo "$REPO" --pattern 'harbor-*' --dir "$attempt_dir" >dl.log 2>&1; then
              mv "$attempt_dir" _leaves
              break
            fi
            if grep -Eqi 'no (valid )?artifacts? (were )?(found|matched|matches)' dl.log; then
              rm -rf "$attempt_dir"
              mkdir -p _leaves
              echo "::warning::No harbor-* artifacts matched; combining an empty set."
              break
            fi
            echo "Leaf download attempt ${attempt} failed:"
            cat dl.log
            rm -rf "$attempt_dir"
            if [ "$attempt" -ge 3 ]; then
              echo "::error::Leaf download failed after ${attempt} attempts (not an empty-artifact case)."
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
          done

      - name: "📊 Combine"
        env:
          # Expected grid, so a model whose leaf never uploaded is shown and
          # flagged incomplete rather than silently ranking on fewer categories.
          EXPECTED_MODELS: ${{ needs.prep.outputs.models }}
          EXPECTED_CATEGORIES: ${{ needs.prep.outputs.categories }}
        run: |
          mkdir -p _leaves
          python3 .github/scripts/aggregate_unified.py _leaves --rollouts "$ROLLOUTS" --out-dir _combined

      - name: "📊 Generate radar chart"
        id: radar-chart
        # radar_results.json is emitted only for full (>=3 category) runs, so its
        # presence is the gate. Best-effort: a chart failure must not fail combine.
        if: hashFiles('_combined/radar_results.json') != ''
        continue-on-error: true
        working-directory: libs/evals
        run: |
          uv sync --extra charts
          uv run --extra charts python scripts/generate_radar.py \
            --results ../../_combined/radar_results.json \
            -o ../../_combined/radar.png \
            --individual-dir ../../_combined/individual \
            --title "Deep Agents Unified Evals"

      - name: "📤 Upload combined results"
        if: ${{ always() && hashFiles('_combined/unified_summary.json') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unified-combined
          path: _combined/

      - name: "🖼️ Publish charts to eval-assets branch"
        id: publish-charts
        if: hashFiles('_combined/radar.png') != ''
        # Best-effort, like the radar step above: the real results are already
        # uploaded (unified-combined artifact + leaderboard summary), so a
        # transient git/push failure must not fail an otherwise-successful
        # combine. The "Append charts" step gates on this outcome == 'success'.
        continue-on-error: true
        env:
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset_dir="runs/${RUN_ID}"

          # Set up a temp workdir so we don't disturb the main checkout.
          tmp="$(mktemp -d)"
          cd "$tmp"
          git init -q
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

          # Fetch eval-assets if it exists; otherwise start an orphan branch.
          if git ls-remote --exit-code origin eval-assets >/dev/null 2>&1; then
            git fetch --depth=1 origin eval-assets
            git checkout eval-assets
          else
            git checkout --orphan eval-assets
            git rm -rf . 2>/dev/null || true
            echo "Auto-managed branch for eval chart assets. Do not merge." > README.md
            git add README.md
          fi

          # Replace the run's prior attempt completely. A workflow rerun keeps
          # RUN_ID, so copying over the old tree would nest individual assets and
          # leave stale files behind.
          rm -rf "${asset_dir}"
          mkdir -p "${asset_dir}"
          cp "$GITHUB_WORKSPACE/_combined/radar.png" "${asset_dir}/radar.png"
          if [ -f "$GITHUB_WORKSPACE/_combined/radar-dark.png" ]; then
            cp "$GITHUB_WORKSPACE/_combined/radar-dark.png" "${asset_dir}/radar-dark.png"
          fi
          if [ -d "$GITHUB_WORKSPACE/_combined/individual" ]; then
            cp -r "$GITHUB_WORKSPACE/_combined/individual" "${asset_dir}/individual"
          fi
          if [ -d "$GITHUB_WORKSPACE/_combined/individual-dark" ]; then
            cp -r "$GITHUB_WORKSPACE/_combined/individual-dark" "${asset_dir}/individual-dark"
          fi

          git add "${asset_dir}"
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "evals: add charts for run ${RUN_ID}" --allow-empty
          git push origin eval-assets

          # Expose base URL for the summary step.
          base="https://raw.githubusercontent.com/${REPO}/eval-assets/${asset_dir}"
          echo "base_url=${base}" >> "$GITHUB_OUTPUT"

      - name: "🖼️ Append charts to summary"
        if: steps.publish-charts.outcome == 'success'
        env:
          BASE_URL: ${{ steps.publish-charts.outputs.base_url }}
        run: |
          # Use <picture> with prefers-color-scheme so GitHub automatically
          # shows the right variant based on the reader's theme setting.
          # Direct download links are included for each variant.
          has_dark=false
          [ -f _combined/radar-dark.png ] && has_dark=true

          {
            echo ""
            echo "## Radar charts"
            echo ""
            echo "### Combined"
            echo ""
            if $has_dark; then
              echo '<picture>'
              echo "  <source media=\"(prefers-color-scheme: dark)\" srcset=\"${BASE_URL}/radar-dark.png\">"
              echo "  <img alt=\"Combined radar chart\" src=\"${BASE_URL}/radar.png\" width=\"500\">"
              echo '</picture>'
              echo ""
              echo "Download: [light](${BASE_URL}/radar.png) · [dark](${BASE_URL}/radar-dark.png)"
            else
              echo "<img alt=\"Combined radar chart\" src=\"${BASE_URL}/radar.png\" width=\"500\">"
              echo ""
              echo "Download: [light](${BASE_URL}/radar.png)"
            fi
            echo ""

            if [ -d _combined/individual ]; then
              echo "### Per-model"
              echo ""
              for img in _combined/individual/*.png; do
                name="$(basename "$img" .png)"
                if [ -d _combined/individual-dark ] && [ -f "_combined/individual-dark/${name}.png" ]; then
                  echo '<picture>'
                  echo "  <source media=\"(prefers-color-scheme: dark)\" srcset=\"${BASE_URL}/individual-dark/${name}.png\">"
                  echo "  <img alt=\"${name}\" src=\"${BASE_URL}/individual/${name}.png\" width=\"500\">"
                  echo '</picture>'
                  echo ""
                  echo "Download: [light](${BASE_URL}/individual/${name}.png) · [dark](${BASE_URL}/individual-dark/${name}.png)"
                else
                  echo "<img alt=\"${name}\" src=\"${BASE_URL}/individual/${name}.png\" width=\"500\">"
                  echo ""
                  echo "Download: [light](${BASE_URL}/individual/${name}.png)"
                fi
                echo ""
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
