name: "📊 Evals - Unified"

on:
  workflow_dispatch:
    inputs:
      models:
        description: "Comma-separated provider:model specs"
        type: string
        required: true
      categories:
        description: "Comma list"
        type: string
        default: "autonomous,conversation,context"
      agent_impl:
        description: "Harness for the code categories (autonomous, context): 'dcode' (Deep Agents Code CLI) or 'bare' (bare create_deep_agent). Conversation always uses tau3."
        type: choice
        default: "dcode"
        options:
          - dcode
          - bare
      profile:
        description: "Task scope: 'full' (every task) or 'lite' (frozen high-signal subset from lite_tasks.py — fewer tasks, full rollouts)."
        type: choice
        default: "full"
        options:
          - full
          - lite
      rollouts:
        type: string
        default: "3"
      concurrency:
        type: string
        default: "4"
      shard_parallel:
        type: string
        default: "10"
      n_shards_autonomous:
        type: string
        default: "10"
      n_shards_conversation:
        type: string
        default: "3"
      n_shards_context:
        type: string
        default: "3"
      sandbox_env:
        type: string
        default: "langsmith"
      force_build:
        description: "Force a rebuild of each task's environment image/snapshot, bypassing any cached or stale record. Required the first time a local dataset runs on the LangSmith sandbox (the snapshot must be built), and to recover from a broken snapshot record."
        type: boolean
        default: false
      harbor_package_override:
        description: "Optional: install Harbor from an arbitrary package spec instead of the locked version, to test an unreleased Harbor build. One spec per line — e.g. `harbor @ git+…@<sha>` on the first line and `harbor-langsmith @ git+…@<sha>#subdirectory=packages/harbor-langsmith` on the second. Use a trusted package source. Prefer an immutable commit SHA, and never embed credentials in the package spec. Leave empty to use the pinned Harbor."
        type: string
        default: ""

permissions:
  contents: read
  # Lets the called reusable workflow manage run artifacts; a caller caps the
  # callee's token, so it must be granted here (provider jobs inherit this).
  actions: write

concurrency:
  group: unified-evals-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prep:
    name: "🔧 Parse models + build provider matrices"
    runs-on: ubuntu-latest
    environment: evals
    outputs:
      anthropic_matrix: ${{ steps.p.outputs.anthropic_matrix }}
      anthropic_has_models: ${{ steps.p.outputs.anthropic_has_models }}
      baseten_matrix: ${{ steps.p.outputs.baseten_matrix }}
      baseten_has_models: ${{ steps.p.outputs.baseten_has_models }}
      fireworks_matrix: ${{ steps.p.outputs.fireworks_matrix }}
      fireworks_has_models: ${{ steps.p.outputs.fireworks_has_models }}
      google_genai_matrix: ${{ steps.p.outputs.google_genai_matrix }}
      google_genai_has_models: ${{ steps.p.outputs.google_genai_has_models }}
      groq_matrix: ${{ steps.p.outputs.groq_matrix }}
      groq_has_models: ${{ steps.p.outputs.groq_has_models }}
      nvidia_matrix: ${{ steps.p.outputs.nvidia_matrix }}
      nvidia_has_models: ${{ steps.p.outputs.nvidia_has_models }}
      ollama_matrix: ${{ steps.p.outputs.ollama_matrix }}
      ollama_has_models: ${{ steps.p.outputs.ollama_has_models }}
      openai_matrix: ${{ steps.p.outputs.openai_matrix }}
      openai_has_models: ${{ steps.p.outputs.openai_has_models }}
      openrouter_matrix: ${{ steps.p.outputs.openrouter_matrix }}
      openrouter_has_models: ${{ steps.p.outputs.openrouter_has_models }}
      xai_matrix: ${{ steps.p.outputs.xai_matrix }}
      xai_has_models: ${{ steps.p.outputs.xai_has_models }}
      other_matrix: ${{ steps.p.outputs.other_matrix }}
      other_has_models: ${{ steps.p.outputs.other_has_models }}
      effective_shard_parallel: ${{ steps.p.outputs.effective_shard_parallel }}
      models: ${{ steps.p.outputs.models }}
      categories: ${{ steps.p.outputs.categories }}
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "🧮 Parse models + build provider matrices"
        id: p
        env:
          UNIFIED_MODELS: ${{ inputs.models }}
          UNIFIED_CATEGORIES: ${{ inputs.categories }}
          UNIFIED_AGENT_IMPL: ${{ inputs.agent_impl }}
          UNIFIED_PROFILE: ${{ inputs.profile }}
          UNIFIED_CONCURRENCY: ${{ inputs.concurrency }}
          UNIFIED_SHARD_PARALLEL: ${{ inputs.shard_parallel }}
          UNIFIED_N_SHARDS_AUTONOMOUS: ${{ inputs.n_shards_autonomous }}
          UNIFIED_N_SHARDS_CONVERSATION: ${{ inputs.n_shards_conversation }}
          UNIFIED_N_SHARDS_CONTEXT: ${{ inputs.n_shards_context }}
        run: python .github/scripts/unified_prep.py

  eval-anthropic:
    needs: prep
    if: needs.prep.outputs.anthropic_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.anthropic_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}
      force_build: ${{ inputs.force_build }}
      harbor_package_override: ${{ inputs.harbor_package_override }}
      include_tasks: ${{ matrix.include_tasks }}

  eval-baseten:
