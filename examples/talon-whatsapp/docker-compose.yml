services:
  talon:
    build:
      context: ../..
      dockerfile: examples/talon-whatsapp/Dockerfile
    image: deepagents-talon-whatsapp:local
    working_dir: /workspace
    env_file:
      - .env
    environment:
      DEEPAGENTS_TALON_HOME: /state
      DEEPAGENTS_TALON_WHATSAPP_SESSION_DIR: /state/whatsapp-session
      DEEPAGENTS_TALON_VOICE_TRANSCRIPTION_ENABLED: ${DEEPAGENTS_TALON_VOICE_TRANSCRIPTION_ENABLED:-true}
      DEEPAGENTS_TALON_VOICE_TRANSCRIPTION_DEVICE: ${DEEPAGENTS_TALON_VOICE_TRANSCRIPTION_DEVICE:-cpu}
    volumes:
      - ../..:/workspace
      - talon-state:/state
    command: >
      bash -c "
      mkdir -p /state/$${AGENT_ASSISTANT_ID}/agent &&
      cp /workspace/examples/talon-whatsapp/AGENTS.md /state/$${AGENT_ASSISTANT_ID}/agent/AGENTS.md &&
      /opt/deepagents-talon-venv/bin/deepagents-talon --whatsapp
      "

volumes:
  talon-state:
