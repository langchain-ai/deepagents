name: "📊 Evals - Unified"

on:
  workflow_dispatch:
    inputs:
      models:
        description: "Comma-separated provider:model specs"
        type: string
        required: true
      categories:
        description: "Comma list"
        type: string
        default: "autonomous,conversation,context"
      rollouts:
        type: string
        default: "3"
      concurrency:
        type: string
        default: "4"
      shard_parallel:
        type: string
        default: "10"
      n_shards_autonomous:
        type: string
        default: "10"
      n_shards_conversation:
        type: string
        default: "3"
      n_shards_context:
        type: string
        default: "3"
      sandbox_env:
        type: string
        default: "langsmith"

permissions:
  contents: read

concurrency:
  group: unified-evals-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prep:
    name: "🔧 Parse models + build provider matrices"
    runs-on: ubuntu-latest
    environment: evals
    outputs:
      anthropic_matrix: ${{ steps.p.outputs.anthropic_matrix }}
      anthropic_has_models: ${{ steps.p.outputs.anthropic_has_models }}
      baseten_matrix: ${{ steps.p.outputs.baseten_matrix }}
      baseten_has_models: ${{ steps.p.outputs.baseten_has_models }}
      fireworks_matrix: ${{ steps.p.outputs.fireworks_matrix }}
      fireworks_has_models: ${{ steps.p.outputs.fireworks_has_models }}
      google_genai_matrix: ${{ steps.p.outputs.google_genai_matrix }}
      google_genai_has_models: ${{ steps.p.outputs.google_genai_has_models }}
      groq_matrix: ${{ steps.p.outputs.groq_matrix }}
      groq_has_models: ${{ steps.p.outputs.groq_has_models }}
      nvidia_matrix: ${{ steps.p.outputs.nvidia_matrix }}
      nvidia_has_models: ${{ steps.p.outputs.nvidia_has_models }}
      ollama_matrix: ${{ steps.p.outputs.ollama_matrix }}
      ollama_has_models: ${{ steps.p.outputs.ollama_has_models }}
      openai_matrix: ${{ steps.p.outputs.openai_matrix }}
      openai_has_models: ${{ steps.p.outputs.openai_has_models }}
      openrouter_matrix: ${{ steps.p.outputs.openrouter_matrix }}
      openrouter_has_models: ${{ steps.p.outputs.openrouter_has_models }}
      xai_matrix: ${{ steps.p.outputs.xai_matrix }}
      xai_has_models: ${{ steps.p.outputs.xai_has_models }}
      other_matrix: ${{ steps.p.outputs.other_matrix }}
      other_has_models: ${{ steps.p.outputs.other_has_models }}
      effective_shard_parallel: ${{ steps.p.outputs.effective_shard_parallel }}
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "🧮 Parse models + build provider matrices"
        id: p
        env:
          UNIFIED_MODELS: ${{ inputs.models }}
          UNIFIED_CATEGORIES: ${{ inputs.categories }}
          UNIFIED_CONCURRENCY: ${{ inputs.concurrency }}
          UNIFIED_SHARD_PARALLEL: ${{ inputs.shard_parallel }}
          UNIFIED_N_SHARDS_AUTONOMOUS: ${{ inputs.n_shards_autonomous }}
          UNIFIED_N_SHARDS_CONVERSATION: ${{ inputs.n_shards_conversation }}
          UNIFIED_N_SHARDS_CONTEXT: ${{ inputs.n_shards_context }}
        run: python .github/scripts/unified_prep.py

  eval-anthropic:
    needs: prep
    if: needs.prep.outputs.anthropic_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.anthropic_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  eval-baseten:
    needs: prep
    if: needs.prep.outputs.baseten_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.baseten_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  eval-fireworks:
    needs: prep
    if: needs.prep.outputs.fireworks_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.fireworks_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  eval-google_genai:
    needs: prep
    if: needs.prep.outputs.google_genai_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.google_genai_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  eval-groq:
    needs: prep
    if: needs.prep.outputs.groq_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.groq_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  eval-nvidia:
    needs: prep
    if: needs.prep.outputs.nvidia_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.nvidia_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  eval-ollama:
    needs: prep
    if: needs.prep.outputs.ollama_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.ollama_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  eval-openai:
    needs: prep
    if: needs.prep.outputs.openai_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.openai_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  eval-openrouter:
    needs: prep
    if: needs.prep.outputs.openrouter_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.openrouter_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  eval-xai:
    needs: prep
    if: needs.prep.outputs.xai_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.xai_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  eval-other:
    needs: prep
    if: needs.prep.outputs.other_has_models == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prep.outputs.other_matrix) }}
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ matrix.model }}
      category: ${{ matrix.category }}
      dataset: ${{ matrix.dataset }}
      dataset_path: ${{ matrix.dataset_path }}
      agent_impl: ${{ matrix.agent_impl }}
      langsmith_dataset: ${{ matrix.langsmith_dataset }}
      n_shards: ${{ matrix.n_shards }}
      shard_parallel: ${{ matrix.shard_parallel }}
      rollouts: ${{ inputs.rollouts }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}

  combine:
    name: "📊 Combine cross-model results"
    needs:
      - eval-anthropic
      - eval-baseten
      - eval-fireworks
      - eval-google_genai
      - eval-groq
      - eval-nvidia
      - eval-ollama
      - eval-openai
      - eval-openrouter
      - eval-xai
      - eval-other
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      RUN_ID: ${{ github.run_id }}
      ROLLOUTS: ${{ inputs.rollouts }}
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "⬇️ Download leaf summaries"
        run: |
          gh run download "$RUN_ID" --repo "$REPO" --pattern 'harbor-*' --dir _leaves \
            || echo "::warning::No harbor-* artifacts found for this run."

      - name: "📊 Combine"
        run: |
          mkdir -p _leaves
          python .github/scripts/aggregate_unified.py _leaves --rollouts "$ROLLOUTS" --out-dir _combined

      - name: "📤 Upload combined results"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unified-combined
          path: _combined/

      - name: "🖼️ Publish charts to eval-assets branch"
        id: publish-charts
        if: hashFiles('_combined/radar.png') != ''
        env:
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset_dir="runs/${RUN_ID}"

          # Set up a temp workdir so we don't disturb the main checkout.
          tmp="$(mktemp -d)"
          cd "$tmp"
          git init -q
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

          # Fetch eval-assets if it exists; otherwise start an orphan branch.
          if git ls-remote --exit-code origin eval-assets >/dev/null 2>&1; then
            git fetch --depth=1 origin eval-assets
            git checkout eval-assets
          else
            git checkout --orphan eval-assets
            git rm -rf . 2>/dev/null || true
            echo "Auto-managed branch for eval chart assets. Do not merge." > README.md
            git add README.md
          fi

          # Copy charts into run-specific directory (light + dark variants).
          mkdir -p "${asset_dir}"
          cp "$GITHUB_WORKSPACE/_combined/radar.png" "${asset_dir}/radar.png"
          if [ -f "$GITHUB_WORKSPACE/_combined/radar-dark.png" ]; then
            cp "$GITHUB_WORKSPACE/_combined/radar-dark.png" "${asset_dir}/radar-dark.png"
          fi
          if [ -d "$GITHUB_WORKSPACE/_combined/individual" ]; then
            cp -r "$GITHUB_WORKSPACE/_combined/individual" "${asset_dir}/individual"
          fi
          if [ -d "$GITHUB_WORKSPACE/_combined/individual-dark" ]; then
            cp -r "$GITHUB_WORKSPACE/_combined/individual-dark" "${asset_dir}/individual-dark"
          fi

          git add "${asset_dir}"
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "evals: add charts for run ${RUN_ID}" --allow-empty
          git push origin eval-assets

          # Expose base URL for the summary step.
          base="https://raw.githubusercontent.com/${REPO}/eval-assets/${asset_dir}"
          echo "base_url=${base}" >> "$GITHUB_OUTPUT"

      - name: "🖼️ Append charts to summary"
        if: steps.publish-charts.outcome == 'success'
        env:
          BASE_URL: ${{ steps.publish-charts.outputs.base_url }}
        run: |
          # Use <picture> with prefers-color-scheme so GitHub automatically
          # shows the right variant based on the reader's theme setting.
          # Direct download links are included for each variant.
          has_dark=false
          [ -f _combined/radar-dark.png ] && has_dark=true

          {
            echo ""
            echo "## Radar charts"
            echo ""
            echo "### Combined"
            echo ""
            if $has_dark; then
              echo '<picture>'
              echo "  <source media=\"(prefers-color-scheme: dark)\" srcset=\"${BASE_URL}/radar-dark.png\">"
              echo "  <img alt=\"Combined radar chart\" src=\"${BASE_URL}/radar.png\" width=\"500\">"
              echo '</picture>'
              echo ""
              echo "Download: [light](${BASE_URL}/radar.png) · [dark](${BASE_URL}/radar-dark.png)"
            else
              echo "<img alt=\"Combined radar chart\" src=\"${BASE_URL}/radar.png\" width=\"500\">"
              echo ""
              echo "Download: [light](${BASE_URL}/radar.png)"
            fi
            echo ""

            if [ -d _combined/individual ]; then
              echo "### Per-model"
              echo ""
              for img in _combined/individual/*.png; do
                name="$(basename "$img" .png)"
                if [ -d _combined/individual-dark ] && [ -f "_combined/individual-dark/${name}.png" ]; then
                  echo '<picture>'
                  echo "  <source media=\"(prefers-color-scheme: dark)\" srcset=\"${BASE_URL}/individual-dark/${name}.png\">"
                  echo "  <img alt=\"${name}\" src=\"${BASE_URL}/individual/${name}.png\" width=\"500\">"
                  echo '</picture>'
                  echo ""
                  echo "Download: [light](${BASE_URL}/individual/${name}.png) · [dark](${BASE_URL}/individual-dark/${name}.png)"
                else
                  echo "<img alt=\"${name}\" src=\"${BASE_URL}/individual/${name}.png\" width=\"500\">"
                  echo ""
                  echo "Download: [light](${BASE_URL}/individual/${name}.png)"
                fi
                echo ""
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
