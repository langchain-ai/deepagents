name: "📊 Evals - Harbor"

on:
  workflow_dispatch:
    inputs:
      models:
        description: "Model set to run. Set definitions: libs/evals/MODEL_GROUPS.md. Leave empty to use models_override instead. Defaults to all models if both are empty."
        required: false
        default: ""
        type: choice
        options:
          - ""
          - all
          - set0
          - set1
          - set2
          - frontier
          - fast
          - open
          - anthropic
          - baseten
          - fireworks
          - google_genai
          - groq
          - nvidia
          - openai
          - ollama
          - openrouter
          - xai
          - "anthropic:claude-haiku-4-5-20251001"
          - "anthropic:claude-sonnet-4-5-20250929"
          - "anthropic:claude-sonnet-4-6"
          - "anthropic:claude-opus-4-1"
          - "anthropic:claude-opus-4-5-20251101"
          - "anthropic:claude-opus-4-6"
          - "baseten:zai-org/GLM-5"
          - "baseten:MiniMaxAI/MiniMax-M2.5"
          - "baseten:moonshotai/Kimi-K2.5"
          - "baseten:nvidia/Nemotron-120B-A12B"
          - "baseten:Qwen/Qwen3-Coder-480B-A35B-Instruct"
          - "fireworks:fireworks/deepseek-v3p2"
          - "fireworks:fireworks/deepseek-v3-0324"
          - "fireworks:fireworks/qwen3-vl-235b-a22b-thinking"
          - "fireworks:fireworks/minimax-m2p1"
          - "fireworks:fireworks/kimi-k2p5"
          - "fireworks:fireworks/glm-5"
          - "fireworks:fireworks/minimax-m2p5"
          - "google_genai:gemini-2.5-flash"
          - "google_genai:gemini-2.5-pro"
          - "google_genai:gemini-3-flash-preview"
          - "google_genai:gemini-3.1-pro-preview"
          - "groq:openai/gpt-oss-120b"
          - "groq:qwen/qwen3-32b"
          - "groq:moonshotai/kimi-k2-instruct"
          - "nvidia:nvidia/nemotron-3-super-120b-a12b"
          - "ollama:glm-5"
          - "ollama:glm-5.1"
          - "ollama:minimax-m2.5"
          - "ollama:minimax-m2.7:cloud"
          - "ollama:qwen3.5:397b-cloud"
          - "ollama:nemotron-3-nano:30b"
          - "ollama:nemotron-3-super"
          - "ollama:cogito-2.1:671b"
          - "ollama:devstral-2:123b"
          - "ollama:ministral-3:14b"
          - "ollama:qwen3-next:80b"
          - "ollama:qwen3-coder:480b-cloud"
          - "ollama:deepseek-v3.2:cloud"
          - "openai:gpt-4o"
          - "openai:gpt-4o-mini"
          - "openai:gpt-4.1"
          - "openai:o3"
          - "openai:o4-mini"
          - "openai:gpt-5.1-codex"
          - "openai:gpt-5.2-codex"
          - "openai:gpt-5.4"
          - "openai:gpt-5.4-mini"
          - "openrouter:minimax/minimax-m2.7"
          - "openrouter:z-ai/glm-5.1"
          - "openrouter:nvidia/nemotron-3-super-120b-a12b"
          - "xai:grok-4"
          - "xai:grok-3-mini-fast"
      models_override:
        description: "Override: comma-separated models (e.g. 'openai:gpt-4.1,anthropic:claude-sonnet-4-6'). Takes priority over dropdown when non-empty."
        required: false
        default: ""
        type: string
      sandbox_env:
        description: "Harbor sandbox environment"
        required: true
        default: "docker"
        type: choice
        options:
          - docker
          - daytona
          - langsmith
          - modal
          - runloop
      n_tasks:
        description: "Maximum number of tasks to run (0 = all tasks in dataset)"
        required: true
        default: "0"
        type: string
      concurrency:
        description: "Number of concurrent trials (parallel sandbox slots)"
        required: true
        default: "1"
        type: string
      agent_mode:
        description: "Agent implementation to use"
        required: true
        default: "sdk"
        type: choice
        options:
          - sdk
          # - cli # need to support properly first
      todo_mode:
        description: "Planning mode(s) to evaluate. 'all' runs tool+prompt+filesystem as separate matrix jobs."
        required: true
        default: "all"
        type: choice
        options:
          - "all"
          - "tool"
          - "prompt"
          - "filesystem"
      trials:
        description: "Number of independent trials per (model, todo_mode) combination."
        required: true
        default: "1"
        type: string

permissions:
  contents: read

env:
  UV_NO_SYNC: "true"
  HARBOR_DATASET_NAME: "terminal-bench"
  HARBOR_DATASET_VERSION: "2.0"
  # Todo experiment: 10 curated medium tasks stratified by planning demand
  HARBOR_EXPERIMENT_TASKS: "constraints-scheduling multi-source-data-merger openssl-selfsigned-cert nginx-request-logging kv-store-grpc log-summary-date-ranges build-pmars db-wal-recovery regex-log sqlite-db-truncate"

jobs:
  prep:
    name: "🔧 Prepare matrix"
    runs-on: ubuntu-latest
    environment: evals
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    env:
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
    steps:
      - name: "📝 Log dispatch inputs"
        continue-on-error: true
        env:
          MODELS: ${{ inputs.models }}
          MODELS_OVERRIDE: ${{ inputs.models_override || '(empty)' }}
          SANDBOX_ENV: ${{ inputs.sandbox_env }}
          N_TASKS: ${{ inputs.n_tasks }}
          CONCURRENCY: ${{ inputs.concurrency }}
          AGENT_MODE: ${{ inputs.agent_mode }}
          TODO_MODE: ${{ inputs.todo_mode }}
          TRIALS: ${{ inputs.trials }}
        run: |
          echo "### 📊 Evals - Harbor dispatch inputs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Input | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          if [ "${MODELS_OVERRIDE}" != "(empty)" ]; then
            echo "| \`models_override\` | \`${MODELS_OVERRIDE}\` |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| \`models\` | \`${MODELS}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| \`sandbox_env\` | \`${SANDBOX_ENV}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${N_TASKS}" = "0" ]; then
            echo "| \`n_tasks\` | all |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| \`n_tasks\` | \`${N_TASKS}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| \`concurrency\` | \`${CONCURRENCY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`agent_mode\` | \`${AGENT_MODE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`todo_mode\` | \`${TODO_MODE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`trials\` | \`${TRIALS}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: "📋 Checkout Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "🐍 Compute Harbor matrix"
        id: set-matrix
        env:
          HARBOR_MODELS: ${{ inputs.models_override || inputs.models || 'all' }}
          TODO_MODE: ${{ inputs.todo_mode }}
          TRIALS: ${{ inputs.trials }}
        run: |
          python - <<'PY'
          import json, os, subprocess, sys, tempfile

          # Run models.py to get the base model list. It writes "matrix=..."
          # to the file pointed to by GITHUB_OUTPUT, so give it a temp file.
          with tempfile.NamedTemporaryFile(mode="w+", suffix=".txt", delete=False) as tmp:
              tmp_path = tmp.name
          env = {**os.environ, "GITHUB_OUTPUT": tmp_path}
          subprocess.run(
              [sys.executable, ".github/scripts/models.py", "harbor"],
              env=env, check=True,
          )
          with open(tmp_path) as f:
              line = f.read().strip()
          os.unlink(tmp_path)

          prefix = "matrix="
          if not line.startswith(prefix):
              raise SystemExit(f"Unexpected models.py output: {line!r}")
          models = json.loads(line[len(prefix):])["include"]

          # Resolve todo_mode variants
          todo_input = os.environ.get("TODO_MODE", "all")
          todo_modes = ["tool", "prompt", "filesystem"] if todo_input == "all" else [todo_input]

          # Resolve trial count
          trials = int(os.environ.get("TRIALS", "1"))

          # Build cross product: model x todo_mode x trial
          include = [
              {**entry, "todo_mode": mode, "trial": trial}
              for entry in models
              for mode in todo_modes
              for trial in range(1, trials + 1)
          ]

          matrix = json.dumps({"include": include}, separators=(",", ":"))
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix}\n")
          PY

      - name: "🐍 Set up Python + UV"
        uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.12"
          cache-suffix: harbor-prep
          working-directory: libs/evals

      - name: "📦 Install Dependencies"
        working-directory: libs/evals
        run: uv sync --group test --locked

      - name: "🧪 Ensure LangSmith dataset"
        working-directory: libs/evals
        run: uv run python scripts/harbor_langsmith.py ensure-dataset "$HARBOR_DATASET_NAME" --version "$HARBOR_DATASET_VERSION"

  harbor:
    name: "📊 Harbor (${{ matrix.model }} / ${{ matrix.todo_mode }} / t${{ matrix.trial }})"
    needs: prep
    runs-on: ubuntu-latest
    environment: evals
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prep.outputs.matrix) }}

    defaults:
      run:
        working-directory: libs/evals
    env:
      HARBOR_CONCURRENCY: ${{ inputs.concurrency }}
      HARBOR_N_TASKS: ${{ inputs.n_tasks }}
      HARBOR_SANDBOX_ENV: ${{ inputs.sandbox_env }}
      HARBOR_MODEL: ${{ matrix.model }}
      HARBOR_AGENT_MODE: ${{ inputs.agent_mode }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BASETEN_API_KEY: ${{ secrets.BASETEN_API_KEY }}
      DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }} # tracing + experiments + dataset mgmt
      LANGSMITH_SANDBOX_API_KEY: ${{ secrets.LANGSMITH_SANDBOX_API_KEY }} # sandbox creation (LangSmithEnvironment)
      LANGSMITH_TRACING: "true"
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      OLLAMA_HOST: "https://ollama.com"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      RUNLOOP_API_KEY: ${{ secrets.RUNLOOP_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
    steps:
      - name: "🔑 Verify sandbox credentials"
        working-directory: .
        run: |
          missing=()

          # LangSmith is always required (experiment tracking)
          [ -z "$LANGSMITH_API_KEY" ] && missing+=("LANGSMITH_API_KEY")

          # Sandbox provider credentials
          case "$HARBOR_SANDBOX_ENV" in
            docker)
              ;; # No additional credentials needed
            daytona)
              [ -z "$DAYTONA_API_KEY" ] && missing+=("DAYTONA_API_KEY")
              ;;
            langsmith)
              ;; # LANGSMITH_API_KEY already checked above
            modal)
              [ -z "$MODAL_TOKEN_ID" ] && missing+=("MODAL_TOKEN_ID")
              [ -z "$MODAL_TOKEN_SECRET" ] && missing+=("MODAL_TOKEN_SECRET")
              ;;
            runloop)
              [ -z "$RUNLOOP_API_KEY" ] && missing+=("RUNLOOP_API_KEY")
              ;;
            *)
              echo "::error::Unknown sandbox environment: $HARBOR_SANDBOX_ENV"
              exit 1
              ;;
          esac

          # Model provider key (infer from model prefix)
          model_provider="${HARBOR_MODEL%%:*}"
          case "$model_provider" in
            anthropic)    [ -z "$ANTHROPIC_API_KEY" ] && missing+=("ANTHROPIC_API_KEY") ;;
            openai)       [ -z "$OPENAI_API_KEY" ] && missing+=("OPENAI_API_KEY") ;;
            google_genai) [ -z "$GOOGLE_API_KEY" ] && missing+=("GOOGLE_API_KEY") ;;
            openrouter)   [ -z "$OPENROUTER_API_KEY" ] && missing+=("OPENROUTER_API_KEY") ;;
            baseten)      [ -z "$BASETEN_API_KEY" ] && missing+=("BASETEN_API_KEY") ;;
            fireworks)    [ -z "$FIREWORKS_API_KEY" ] && missing+=("FIREWORKS_API_KEY") ;;
            ollama)       [ -z "$OLLAMA_API_KEY" ] && missing+=("OLLAMA_API_KEY") ;;
            groq)         [ -z "$GROQ_API_KEY" ] && missing+=("GROQ_API_KEY") ;;
            xai)          [ -z "$XAI_API_KEY" ] && missing+=("XAI_API_KEY") ;;
            nvidia)       [ -z "$NVIDIA_API_KEY" ] && missing+=("NVIDIA_API_KEY") ;;
            *)
              echo "::warning::No credential check defined for provider '$model_provider' -- verify secrets manually"
              ;;
          esac

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets for $HARBOR_SANDBOX_ENV/$HARBOR_MODEL: ${missing[*]}"
            exit 1
          fi
          echo "All required credentials present for $HARBOR_SANDBOX_ENV/$HARBOR_MODEL"

      - name: "📋 Checkout Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "🐍 Set up Python + UV"
        uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.12"
          cache-suffix: harbor
          working-directory: libs/evals

      - name: "📦 Install Dependencies"
        run: uv sync --group test --locked

      - name: "🧪 Create LangSmith experiment"
        id: langsmith
        env:
          HARBOR_TODO_MODE: ${{ matrix.todo_mode }}
          HARBOR_TRIAL: ${{ matrix.trial }}
        run: |
          set -euo pipefail
          metadata=$(python -c "import json; print(json.dumps({'todo_mode':'$HARBOR_TODO_MODE','trial':$HARBOR_TRIAL}))")
          output=$(uv run python scripts/harbor_langsmith.py create-experiment "$HARBOR_DATASET_NAME" --model "$HARBOR_MODEL-${HARBOR_TODO_MODE}-t${HARBOR_TRIAL}" --metadata "$metadata")
          line_count=$(echo "$output" | wc -l | tr -d ' ')
          if [ "$line_count" -ne 2 ]; then
            echo "::error::Expected exactly 2 lines from create-experiment, got $line_count:"
            echo "$output" | head -5
            exit 1
          fi
          experiment_name=$(echo "$output" | head -1)
          experiment_url=$(echo "$output" | tail -1)
          if [ -z "$experiment_name" ] || [ -z "$experiment_url" ]; then
            echo "::error::create-experiment returned empty name or URL: name='$experiment_name' url='$experiment_url'"
            exit 1
          fi
          echo "experiment_name=$experiment_name" >> "$GITHUB_OUTPUT"
          echo "experiment_url=$experiment_url" >> "$GITHUB_OUTPUT"
          echo "LANGSMITH_EXPERIMENT=$experiment_name" >> "$GITHUB_ENV"
          echo "LANGSMITH_EXPERIMENT_URL=$experiment_url" >> "$GITHUB_ENV"

      - name: "🔇 Suppress Harbor first-run tips"
        run: |
          mkdir -p ~/.cache/harbor
          echo '{"seen":["registry-datasets-hint"]}' > ~/.cache/harbor/notifications.json

      - name: "⚓ Run Harbor"
        run: |
          # Print LangSmith experiment link
          echo "LangSmith experiment: $LANGSMITH_EXPERIMENT"
          echo "  View at: $LANGSMITH_EXPERIMENT_URL"
          echo ""

          # Run Harbor
          n_tasks_flag=""
          if [ "$HARBOR_N_TASKS" != "0" ]; then
            n_tasks_flag="--n-tasks $HARBOR_N_TASKS"
          fi

          # LangSmith sandboxes are not a built-in harbor environment type,
          # so we use --environment-import-path instead of --env.
          if [ "$HARBOR_SANDBOX_ENV" = "langsmith" ]; then
            env_flag="--environment-import-path deepagents_harbor.langsmith_environment:LangSmithEnvironment"
          else
            env_flag="--env $HARBOR_SANDBOX_ENV"
          fi

          # Build task filter flags from experiment task list
          task_filter_flags=""
          for task in $HARBOR_EXPERIMENT_TASKS; do
            task_filter_flags="$task_filter_flags -t $task"
          done

          uv run harbor run \
            --agent-import-path deepagents_harbor:DeepAgentsWrapper \
            --dataset "$HARBOR_DATASET_NAME@$HARBOR_DATASET_VERSION" \
            -n "$HARBOR_CONCURRENCY" \
            $n_tasks_flag \
            $task_filter_flags \
            --jobs-dir jobs/terminal-bench \
            $env_flag \
            --model "$HARBOR_MODEL" \
            --agent-kwarg use_cli_agent=${{ inputs.agent_mode == 'cli' && 'true' || 'false' }} \
            --agent-kwarg todo_mode=${{ matrix.todo_mode }}

      - name: "🔍 Find latest Harbor job"
        id: latest-job
        run: |
          latest_job=$(python - <<'PY'
          from pathlib import Path

          jobs_dir = Path("jobs/terminal-bench")
          job_dirs = sorted(path for path in jobs_dir.iterdir() if path.is_dir())
          if not job_dirs:
              raise SystemExit("No Harbor job directory found")
          print(job_dirs[-1])
          PY
          )
          echo "job_dir=$latest_job" >> "$GITHUB_OUTPUT"

      - name: "⭐ Add Harbor rewards to LangSmith"
        if: always() && steps.latest-job.outcome == 'success' && steps.langsmith.outcome == 'success'
        env:
          HARBOR_JOB_DIR: ${{ steps.latest-job.outputs.job_dir }}
          LANGSMITH_EXPERIMENT_NAME: ${{ steps.langsmith.outputs.experiment_name }}
        run: |
          uv run python scripts/harbor_langsmith.py add-feedback \
            "$HARBOR_JOB_DIR" \
            --project-name "$LANGSMITH_EXPERIMENT_NAME"

      - name: "📊 Write per-job summary JSON"
        if: always()
        env:
          HARBOR_JOB_DIR: ${{ steps.latest-job.outputs.job_dir }}
          HARBOR_TODO_MODE: ${{ matrix.todo_mode }}
          HARBOR_TRIAL: ${{ matrix.trial }}
          LANGSMITH_EXPERIMENT_NAME: ${{ steps.langsmith.outputs.experiment_name }}
          LANGSMITH_EXPERIMENT_URL: ${{ steps.langsmith.outputs.experiment_url }}
          LATEST_JOB_OUTCOME: ${{ steps.latest-job.outcome }}
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          job_dir = os.environ.get("HARBOR_JOB_DIR", "")
          model = os.environ["HARBOR_MODEL"]
          todo_mode = os.environ["HARBOR_TODO_MODE"]
          trial = int(os.environ["HARBOR_TRIAL"])
          experiment_name = os.environ.get("LANGSMITH_EXPERIMENT_NAME", "")
          experiment_url = os.environ.get("LANGSMITH_EXPERIMENT_URL", "")

          rewards = {}
          metrics = {}
          if job_dir and Path(job_dir).exists():
              for trial_dir in sorted(Path(job_dir).iterdir()):
                  result_path = trial_dir / "result.json"
                  if not result_path.exists():
                      continue
                  result = json.loads(result_path.read_text())
                  task_name = trial_dir.name

                  vr = result.get("verifier_result")
                  if isinstance(vr, dict):
                      r = vr.get("rewards", {})
                      if isinstance(r, dict) and "reward" in r:
                          rewards[task_name] = r["reward"]
                      else:
                          rewards[task_name] = 0.0
                  else:
                      rewards[task_name] = 0.0

                  task_metrics = {}

                  started = result.get("started_at", "")
                  finished = result.get("finished_at", "")
                  if started and finished:
                      try:
                          t0 = datetime.fromisoformat(started)
                          t1 = datetime.fromisoformat(finished)
                          task_metrics["duration_s"] = round((t1 - t0).total_seconds(), 1)
                      except (ValueError, TypeError):
                          pass

                  traj_path = trial_dir / "trajectory.json"
                  if traj_path.exists():
                      traj = json.loads(traj_path.read_text())
                      fm = traj.get("final_metrics") or {}
                      task_metrics["input_tokens"] = fm.get("total_prompt_tokens") or 0
                      task_metrics["output_tokens"] = fm.get("total_completion_tokens") or 0
                      task_metrics["agent_steps"] = fm.get("total_steps") or 0
                      tool_calls = 0
                      for step in traj.get("steps", []):
                          tcs = step.get("tool_calls")
                          if tcs:
                              tool_calls += len(tcs)
                      task_metrics["tool_calls"] = tool_calls

                  task_metrics["total_tokens"] = (
                      task_metrics.get("input_tokens", 0)
                      + task_metrics.get("output_tokens", 0)
                  )
                  metrics[task_name] = task_metrics

          summary = {
              "model": model,
              "todo_mode": todo_mode,
              "trial": trial,
              "experiment_name": experiment_name,
              "experiment_url": experiment_url,
              "rewards": rewards,
              "metrics": metrics,
          }
          Path("job_summary.json").write_text(json.dumps(summary, indent=2))
          PY

          # Also write a human-readable step summary
          {
            echo "## Harbor run"
            echo
            echo "- Model: $HARBOR_MODEL"
            echo "- Todo mode: $HARBOR_TODO_MODE"
            echo "- Trial: $HARBOR_TRIAL"
            echo "- Dataset: ${HARBOR_DATASET_NAME}@${HARBOR_DATASET_VERSION}"
            echo "- Sandbox: ${HARBOR_SANDBOX_ENV}"
            if [ -n "$LANGSMITH_EXPERIMENT_URL" ]; then
              echo "- LangSmith experiment: [$LANGSMITH_EXPERIMENT_NAME]($LANGSMITH_EXPERIMENT_URL)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "📤 Upload Harbor artifacts"
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: harbor-${{ strategy.job-index }}
          path: |
            libs/evals/jobs/terminal-bench
            libs/evals/job_summary.json
          if-no-files-found: warn

  summary:
    name: "📊 Experiment summary"
    needs: [harbor]
    if: always()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/evals
    steps:
      - name: "📋 Checkout Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "📥 Download all artifacts"
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4
        with:
          pattern: harbor-*
          path: libs/evals/all-results/

      - name: "🐍 Set up Python + UV"
        uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.12"
          cache-suffix: harbor-summary
          working-directory: libs/evals

      - name: "📦 Install Dependencies"
        run: uv sync --group test --locked

      - name: "📊 Generate experiment summary"
        run: |
          uv run python scripts/experiment_summary.py all-results/ >> "$GITHUB_STEP_SUMMARY"
