# Harbor evaluation workflow for Deep Agents
#
# Runs Harbor evaluations (terminal-bench, harbor-index, tau3, local datasets)
# with Docker or LangSmith sandboxes; terminal-bench is the default.
# Models are selected via dropdown or comma-separated override.
#
# Config (non-secret):
#   OLLAMA_HOST is hardcoded to https://ollama.com in the workflow env for
#   Ollama Cloud inference; it is not read from secrets.
#
# Required secrets (vary by sandbox + model provider):
#   LANGSMITH_API_KEY          — experiment tracking + LangSmith sandbox (always required)
#   ANTHROPIC_API_KEY          — needed for Anthropic models
#   OPENAI_API_KEY             — needed for OpenAI models and tau3 verifier/user simulator
#   GOOGLE_API_KEY             — needed for Google models
#   XAI_API_KEY                — needed for xAI/Grok models
#   GROQ_API_KEY               — needed for Groq-hosted models
#   OLLAMA_API_KEY             — needed for Ollama Cloud models
#   NVIDIA_API_KEY             — needed for NVIDIA NIM models
#   BASETEN_API_KEY            — needed for Baseten-hosted models
#   FIREWORKS_API_KEY          — needed for Fireworks-hosted models
#   OPENROUTER_API_KEY         — needed for OpenRouter-hosted models

name: "📊 Evals - Harbor"
run-name: >-
  📊 Evals - Harbor — ${{ inputs.models_override && (contains(inputs.models_override, ',') && 'custom models' || inputs.models_override) || inputs.models || 'all' }} / ${{ inputs.sandbox_env }} / ${{ inputs.agent_impl || 'dcode' }}

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset to run through Harbor."
        required: true
        default: "terminal-bench/terminal-bench-2"
        type: choice
        options:
          - "terminal-bench/terminal-bench-2"
          - "terminal-bench/terminal-bench-2-1"
          - "sierra-research/tau3-bench"
          - "tau3-subset"
          - "harbor-index/harbor-index-1.0"
      dataset_override:
        description: "Override: arbitrary Harbor dataset ref (e.g. 'owner/dataset'). Takes priority over the dataset dropdown when non-empty."
        required: false
        default: ""
        type: string
      dataset_path:
        description: "Optional local dataset path relative to libs/evals (for example, datasets/context-retrieval-evals). Takes priority over registry inputs."
        required: false
        default: ""
        type: string
      models:
        description: "The single model to evaluate (provider:model). This workflow runs exactly one model — model groups are not accepted. Override with models_override."
        required: true
        default: "fireworks:accounts/fireworks/models/glm-5p2"
        type: choice
        options:
          - "anthropic:claude-haiku-4-5"
          - "anthropic:claude-sonnet-4-5-20250929"
          - "anthropic:claude-sonnet-4-6"
          - "anthropic:claude-opus-4-5-20251101"
          - "anthropic:claude-opus-4-6"
          - "anthropic:claude-opus-4-7"
          - "baseten:zai-org/GLM-5"
          - "baseten:MiniMaxAI/MiniMax-M2.5"
          - "baseten:moonshotai/Kimi-K2.5"
          - "baseten:moonshotai/Kimi-K2.6"
          - "baseten:nvidia/Nemotron-120B-A12B"
          - "baseten:Qwen/Qwen3-Coder-480B-A35B-Instruct"
          - "fireworks:accounts/fireworks/models/deepseek-v3p2"
          - "fireworks:accounts/fireworks/models/deepseek-v3-0324"
          - "fireworks:accounts/fireworks/models/deepseek-v4-pro"
          - "fireworks:accounts/fireworks/models/kimi-k2p5"
          - "fireworks:accounts/fireworks/models/kimi-k2p6"
          - "fireworks:accounts/fireworks/models/glm-5"
          - "fireworks:accounts/fireworks/models/glm-5p1"
          - "fireworks:accounts/fireworks/models/glm-5p2"
          - "fireworks:accounts/fireworks/models/minimax-m2p5"
          - "fireworks:accounts/fireworks/models/minimax-m2p7"
          - "fireworks:accounts/fireworks/models/minimax-m3"
          - "fireworks:accounts/fireworks/models/nvidia-nemotron-3-super-120b-a12b-fp8"
          - "fireworks:accounts/fireworks/models/qwen3-vl-235b-a22b-thinking"
          - "google_genai:gemini-2.5-flash"
          - "google_genai:gemini-2.5-pro"
          - "google_genai:gemini-3-flash-preview"
          - "google_genai:gemini-3.1-pro-preview"
          - "groq:openai/gpt-oss-120b"
          - "groq:qwen/qwen3-32b"
          - "groq:moonshotai/kimi-k2-instruct"
          - "nvidia:nvidia/nemotron-3-super-120b-a12b"
          - "ollama:glm-5:cloud"
          - "ollama:glm-5.1:cloud"
          - "ollama:minimax-m2.5:cloud"
          - "ollama:minimax-m2.7:cloud"
          - "ollama:qwen3.5:cloud"
          - "ollama:nemotron-3-super:cloud"
          - "openai:gpt-4.1"
          - "openai:gpt-5.1-codex"
          - "openai:gpt-5.2-codex"
          - "openai:gpt-5.3-codex"
          - "openai:gpt-5.4"
          - "openai:gpt-5.4-mini"
          - "openai:gpt-5.5"
          - "openai:gpt-5.5-pro"
          - "openrouter:minimax/minimax-m2.7"
          - "openrouter:moonshotai/kimi-k2.5"
          - "openrouter:moonshotai/kimi-k2.6"
          - "openrouter:z-ai/glm-5.1"
          - "openrouter:z-ai/glm-5.2"
          - "openrouter:nvidia/nemotron-3-super-120b-a12b"
          - "openrouter:deepseek/deepseek-v4-pro"
          - "xai:grok-4"
          - "xai:grok-3-mini-fast"
      models_override:
        description: "Override: a single model ref not in the dropdown (e.g. 'openai:gpt-5.6'). Takes priority over the dropdown when non-empty. Must resolve to exactly one model."
        required: false
        default: ""
        type: string
      sandbox_env:
        description: "Harbor sandbox environment."
        required: true
        default: "langsmith"
        type: choice
        options:
          - docker
          - langsmith
      agent_impl:
        description: "Deep Agents implementation run through Harbor's LangGraph agent."
        required: true
        default: "dcode"
        type: choice
        options:
          - dcode
          - bare
          - tau3
      n_tasks:
        description: "Maximum number of tasks to run (0 = all)."
        required: true
        default: "0"
        type: string
      include_tasks:
        description: "Space-separated task-name globs (empty = all tasks)."
        required: false
        default: ""
        type: string
      rollouts_per_task:
        description: "Rollouts (attempts) per task = K. Reported as a single pass@K and avg@K. No cap."
        required: true
        default: "3"
        type: string
      n_retries:
        description: "Max retries per trial on transient failure (e.g. a LangSmith snapshot build error). 0 = no retries."
        required: true
        default: "0"
        type: string
      concurrency:
        description: "Concurrent trials (sandbox slots) per shard job. Capped at 4."
        required: true
        default: "4"
        type: string
      agent_timeout_multiplier:
        description: "Multiplier for the agent EXECUTION timeout (e.g. 0.1 caps each rollout's wall-clock to bound model cost). Setup + env-build timeouts are unaffected, so the agent-setup phase is still tested at full budget — useful for cheap concurrency stress tests."
        required: false
        default: "1.0"
        type: string
      env_build_timeout_multiplier:
        description: "Multiplier for each task's environment build timeout (harbor's client-side wait). Note: does not extend the LangSmith build service's own limit."
        required: false
        default: "1.0"
        type: string
      override_storage_mb:
        description: "Override the sandbox snapshot filesystem size (MB), raising harbor's 32 GiB floor. Use for heavy harbor-index images that fail the LangSmith snapshot build by exhausting storage (e.g. 65536 = 64 GiB). 0 = don't override."
        required: false
        default: "0"
        type: string
      disable_verification:
        description: "Skip the task verifier (tests). For setup/concurrency stress tests where task pass/fail is not the goal."
        required: false
        default: false
        type: boolean
      force_build:
        description: "Force a rebuild of each task's environment image/snapshot, bypassing any cached or stale record. Required the first time a local dataset runs on the LangSmith sandbox (the snapshot must be built), and to recover from a broken snapshot record."
        required: false
        default: false
        type: boolean
      n_shards:
        description: "Split the dataset's tasks across N shard jobs per model (each on its own runner at the per-job concurrency). Composes with include_tasks/n_tasks: those select the task set first, then it's partitioned across shards (total tasks run is unchanged). May be set as high as the task count (one task per shard) for dynamic dispatch — shards drain through a derived pool (shard_parallel), not all at once. Capped at 200 (shard_matrix.MAX_SHARDS); the pool is bounded so shard_parallel * concurrency <= 40 concurrent sandboxes."
        required: false
        default: "10"
        type: string
      harbor_package_override:
        description: "Optional: install Harbor from the trusted harbor-framework/harbor repository instead of the locked version. One spec per line. Only `harbor`, `harbor[langsmith]`, and `harbor-langsmith` refs from `git+https://github.com/harbor-framework/harbor.git@<40-char-sha>` are accepted; `harbor-langsmith` must include `#subdirectory=packages/harbor-langsmith`. Branches, tags, arbitrary hosts, and embedded credentials are rejected. Leave empty to use the pinned Harbor."
        required: false
        default: ""
        type: string
      judge_models:
        description: "Grader model for LLM-judge verifiers (e.g. harbor-index), used with an OpenAI judge. Prefer an independent grader, not the model under test."
        required: false
        default: "gpt-5.6-luna"
        type: string
permissions:
  contents: read
  # Lets the called reusable workflow manage run artifacts; a caller caps the
  # callee's token, so it must be granted here.
  actions: write

env:
  UV_NO_SYNC: "true"
  HARBOR_DATASET: ${{ inputs.dataset_override || inputs.dataset || 'terminal-bench/terminal-bench-2' }}
  HARBOR_DATASET_PATH: ${{ inputs.dataset_path || '' }}

jobs:
  prep:
    name: "🔧 Prepare matrix"
    runs-on: ubuntu-latest
    environment: evals
    outputs:
      # The single resolved model spec (this workflow accepts exactly one model).
      model: ${{ steps.extract-model.outputs.model }}
      # Eval category derived from the dataset inputs, consumed by the leaf
      # workflow's unified reporting (autonomous | conversation | context).
      category: ${{ steps.category.outputs.category }}
      # Derived shard pool (dynamic dispatch) from the "🔒 Validate single
      # model + resource limits" step, for the run job's shard_parallel input.
      shard_parallel: ${{ steps.limits.outputs.shard_parallel }}
    env:
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
    steps:
      - name: "📝 Log dispatch inputs"
        continue-on-error: true
        env:
          MODELS: ${{ inputs.models }}
          MODELS_OVERRIDE: ${{ inputs.models_override || '(empty)' }}
          SANDBOX_ENV: ${{ inputs.sandbox_env }}
          AGENT_IMPL: ${{ inputs.agent_impl }}
          DATASET: ${{ inputs.dataset_override || inputs.dataset || 'terminal-bench/terminal-bench-2' }}
          N_TASKS: ${{ inputs.n_tasks }}
          INCLUDE_TASKS: ${{ inputs.include_tasks }}
          ROLLOUTS_PER_TASK: ${{ inputs.rollouts_per_task }}
          CONCURRENCY: ${{ inputs.concurrency }}
        run: |
          echo "### 📊 Evals - Harbor dispatch inputs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Input | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          if [ "${MODELS_OVERRIDE}" != "(empty)" ]; then
            echo "| \`models_override\` | \`${MODELS_OVERRIDE}\` |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| \`models\` | \`${MODELS}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| \`sandbox_env\` | \`${SANDBOX_ENV}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`agent_impl\` | \`${AGENT_IMPL}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`dataset\` | \`${DATASET}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${N_TASKS}" = "0" ]; then
            echo "| \`n_tasks\` | all |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| \`n_tasks\` | \`${N_TASKS}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${INCLUDE_TASKS}" ]; then
            echo "| \`include_tasks\` | \`${INCLUDE_TASKS}\` |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| \`include_tasks\` | (empty) |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| \`rollouts_per_task\` | \`${ROLLOUTS_PER_TASK}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`concurrency\` | \`${CONCURRENCY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: "📋 Checkout Code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "🐍 Compute Harbor matrix"
        id: set-matrix
        run: python .github/scripts/models.py harbor
        env:
          HARBOR_MODELS: ${{ inputs.models_override || inputs.models || 'fireworks:accounts/fireworks/models/glm-5p2' }}

      - name: "🔒 Validate single model + resource limits"
        # This workflow evaluates exactly ONE model. Fail fast (before the matrix
        # fans out) if the resolved model set is not a single model, or if the
        # per-run limits are exceeded (n_shards <= shard_matrix.MAX_SHARDS=200,
        # concurrency <= 4). n_shards may be set high for dynamic dispatch (one
        # task per shard); shards drain through a derived shard_parallel pool
        # instead of all running at once, bounded so shard_parallel *
        # concurrency <= 40 concurrent sandboxes. Inputs are read
        # via env (no shell interpolation) and int-parsed in the script.
        # See validate_harbor_limits.py (unit-tested in test_validate_harbor_limits.py).
        id: limits
        env:
          N_SHARDS: ${{ inputs.n_shards || '10' }}
          CONCURRENCY: ${{ inputs.concurrency || '4' }}
          ROLLOUTS: ${{ inputs.rollouts_per_task }}
          MODEL_MATRIX: ${{ steps.set-matrix.outputs.matrix }}
        run: python .github/scripts/validate_harbor_limits.py

      - name: "🎯 Extract single model"
        id: extract-model
        # The leaf workflow (_harbor_run.yml) now owns its own shard matrix, so
        # this job only needs to hand it the single resolved model spec. The
        # "🔒 Validate single model" step above already guarantees the matrix
        # has exactly one entry; pull it out via env (no shell interpolation
        # of untrusted input).
        env:
          MODEL_MATRIX: ${{ steps.set-matrix.outputs.matrix }}
        run: |
          echo "model=$(python3 -c 'import json, os; print(json.loads(os.environ["MODEL_MATRIX"])["include"][0]["model"])')" >> "$GITHUB_OUTPUT"

      - name: "🏷️ Derive category"
        id: category
        # Mirrors the leaf's own category convention: an explicit local
        # dataset path is always "context"; a tau3 dataset ref is
        # "conversation"; everything else (terminal-bench, harbor-index, ...)
        # is "autonomous".
        env:
          DATASET_PATH: ${{ inputs.dataset_path }}
          DATASET: ${{ inputs.dataset_override || inputs.dataset }}
        run: |
          if [ -n "${DATASET_PATH}" ]; then
            echo "category=context" >> "$GITHUB_OUTPUT"
          elif [[ "${DATASET}" == *tau3* ]]; then
            echo "category=conversation" >> "$GITHUB_OUTPUT"
          else
            echo "category=autonomous" >> "$GITHUB_OUTPUT"
          fi

  run:
    name: "📊 Evals - Harbor (${{ needs.prep.outputs.model }} / ${{ inputs.sandbox_env }} / ${{ inputs.agent_impl }})"
    needs: prep
    uses: ./.github/workflows/_harbor_run.yml
    secrets: inherit
    with:
      model: ${{ needs.prep.outputs.model }}
      category: ${{ needs.prep.outputs.category }}
      dataset: ${{ inputs.dataset_override || inputs.dataset }}
      dataset_path: ${{ inputs.dataset_path }}
      agent_impl: ${{ inputs.agent_impl }}
      # Empty: the leaf derives the dataset name itself.
      langsmith_dataset: ""
      rollouts: ${{ inputs.rollouts_per_task }}
      n_shards: ${{ inputs.n_shards }}
      # Derived pool the shards drain through (dynamic dispatch), not n_shards
      # itself — see the prep job's "🔒 Validate single model + resource limits" step.
      shard_parallel: ${{ needs.prep.outputs.shard_parallel }}
      concurrency: ${{ inputs.concurrency }}
      sandbox_env: ${{ inputs.sandbox_env }}
      n_retries: ${{ inputs.n_retries }}
      n_tasks: ${{ inputs.n_tasks }}
      include_tasks: ${{ inputs.include_tasks }}
      agent_timeout_multiplier: ${{ inputs.agent_timeout_multiplier }}
      env_build_timeout_multiplier: ${{ inputs.env_build_timeout_multiplier }}
      override_storage_mb: ${{ inputs.override_storage_mb }}
      disable_verification: ${{ inputs.disable_verification }}
      force_build: ${{ inputs.force_build }}
      harbor_package_override: ${{ inputs.harbor_package_override }}
      judge_models: ${{ inputs.judge_models }}
