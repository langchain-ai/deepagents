# Coding agent example.
#
# This is the only file you need to maintain for the agent. ``deepagents
# deploy`` generates the runtime graph from this config — there is no
# hand-written entry point.

[agent]
name = "deepagents-deploy-coding-agent"
model = "anthropic:claude-sonnet-4-5"
system_prompt = "You are an expert software engineer. You work inside a fresh sandbox for each thread. Project context is at /agent_memories/AGENTS.md, skills are under /agent_memories/skills/, and the user's coding preferences are at /user_memories/preferences.md. Update that file when you learn something durable about how this user wants you to work. Use the sandbox (everything else under /) for actually reading, writing, and executing code."

# Agent-scoped files (shared across all users of this agent). Backed by a
# LangSmith Prompt Hub repo named after [agent].name.
[agent_memories]
backend = "hub"
sources = ["./AGENTS.md"]

# Per-user mutable files. Always backed by the LangGraph store with a
# (agent, user_id, "user_memories") namespace, so each user gets isolated
# preferences that persist across threads.
[user_memories]
sources = ["./preferences.md"]

[skills]
sources = ["./skills/"]

[tools]
python_file = "./tools.py"

[mcp]
config = "./.mcp.json"

# One sandbox per thread, lazily created on first tool call.
[sandbox]
provider = "langsmith"
template = "coding-agent"
image = "python:3.12"

[deploy]
python_version = "3.12"
dependencies = ["langchain-anthropic", "langchain-tavily"]
env_file = ".env"
