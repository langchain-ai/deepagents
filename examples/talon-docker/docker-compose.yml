services:
  talon:
    build:
      context: ../..
      dockerfile: examples/talon-docker/Dockerfile
    image: deepagents-talon:local
    working_dir: /workspace
    env_file:
      - .env
    environment:
      DEEPAGENTS_TALON_HOME: /workspace/.deepagents
      DEEPAGENTS_TALON_WORKSPACE: /workspace
      DEEPAGENTS_TALON_WHATSAPP_SESSION_DIR: /workspace/.deepagents/whatsapp-session
      DEEPAGENTS_TALON_TELEGRAM_SESSION_DIR: /workspace/.deepagents/telegram-session
      DEEPAGENTS_TALON_VOICE_TRANSCRIPTION_ENABLED: ${DEEPAGENTS_TALON_VOICE_TRANSCRIPTION_ENABLED:-true}
      DEEPAGENTS_TALON_VOICE_TRANSCRIPTION_DEVICE: ${DEEPAGENTS_TALON_VOICE_TRANSCRIPTION_DEVICE:-cpu}
    volumes:
      - ${HOME}/agent-workspace:/workspace
    command: >
      bash -c "
      assistant_id=\"$${AGENT_ASSISTANT_ID:-default}\" &&
      mkdir -p \"/workspace/.deepagents/$${assistant_id}/agent\" &&
      cp /opt/deepagents-talon/AGENTS.md \"/workspace/.deepagents/$${assistant_id}/agent/AGENTS.md\" &&
      exec /opt/deepagents-talon-venv/bin/deepagents-talon
      "
