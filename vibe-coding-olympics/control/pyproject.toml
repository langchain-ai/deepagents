[project]
name = "vibe-olympics-control"
version = "0.1.0"
description = "Web control panel for dispatching game + player commands."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "httpx>=0.27",
    "iterm2>=2.7",
    "pydantic>=2.8",
]

[project.scripts]
vibe-control = "control_server.main:main"
vibe-players = "control_server.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["control_server"]
