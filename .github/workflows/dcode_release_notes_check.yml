# Required merge gate for curated deepagents-code release notes. This workflow
# reads the release PR through the API and executes only automation from main.

name: "📝 dcode curated release notes check"

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review, converted_to_draft, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Release PR number to validate after a release-please sync"
        required: true
        type: string

permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: dcode-release-notes-check-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  curated-release-notes:
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request
    name: Publish curated release notes check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted validator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          path: trusted-source
          persist-credentials: false

      - name: Validate current curated release-note state
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
          BOT_LOGIN: ${{ vars.DCODE_RELEASE_BOT_LOGIN }}
          BOT_ID: ${{ vars.DCODE_RELEASE_BOT_ID }}
        with:
          script: |
            const { checkCuratedState, isReleaseBranchPr } = require('./trusted-source/.github/scripts/dcode-release-notes.js');
            const number = Number(process.env.PR_NUMBER);
            if (!Number.isSafeInteger(number) || number <= 0) {
              core.setFailed(`Invalid PR number: ${process.env.PR_NUMBER}`);
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: number });
            // Report the `curated release notes` context on every PR so it can be a
            // required status check on main without stranding unrelated PRs: a
            // non-release PR gets an immediate passing check; only the
            // deepagents-code release PR runs the full validation below.
            if (!isReleaseBranchPr(pr)) {
              core.info('Not the deepagents-code release branch; reporting curated release notes as satisfied');
              await github.rest.checks.create({
                owner,
                repo,
                head_sha: pr.head.sha,
                name: 'curated release notes',
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: 'Curated release notes not required',
                  summary: 'Not the deepagents-code release PR; curated release notes are not required.',
                },
              });
              return;
            }
            const { data: check } = await github.rest.checks.create({
              owner,
              repo,
              head_sha: pr.head.sha,
              name: 'curated release notes',
              status: 'in_progress',
            });
            let conclusion = 'failure';
            let summary = 'Curated release-note validation did not complete.';
            try {
              let failure = null;
              const validatorCore = {
                info: message => core.info(message),
                warning: message => core.warning(message),
                setFailed: message => {
                  failure = message;
                  core.error(message);
                },
              };
              const result = await checkCuratedState({
                github,
                context,
                core: validatorCore,
                number,
                expectedHead: pr.head.sha,
                login: process.env.BOT_LOGIN,
                id: process.env.BOT_ID,
              });
              if (failure === null) {
                conclusion = 'success';
                summary = `Curated release-note state: ${result.status}.`;
              } else {
                summary = failure;
              }
            } catch (error) {
              summary = error instanceof Error ? error.message : String(error);
              core.error(summary);
            } finally {
              await github.rest.checks.update({
                owner,
                repo,
                check_run_id: check.id,
                status: 'completed',
                conclusion,
                output: {
                  title: conclusion === 'success' ? 'Curated release notes are current' : 'Curated release notes are required',
                  summary,
                },
              });
            }
            if (conclusion !== 'success') core.setFailed(summary);
