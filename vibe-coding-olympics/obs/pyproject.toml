[project]
name = "vibe-olympics-obs"
version = "0.1.0"
description = "Game state machine + OBS compositor for the Vibe Coding Olympics."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "obsws-python>=1.7",
    "pydantic>=2.8",
]

[project.scripts]
vibe-obs = "obs_runner.main:main"

[dependency-groups]
test = [
    "pytest>=8.3",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["obs_runner"]
