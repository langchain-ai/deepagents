# Warn on open PRs after 14 days and close them after 30 days, measured from
# when the PR was opened (by age, not last activity). The warning also applies
# a "pending-deletion" label. Draft PRs and PRs with the "do-not-close" label
# are skipped. Thresholds and labels are defined in
# .github/scripts/close-old-prs.js.

name: Close Old PRs

on:
  schedule:
    - cron: "17 14 * * *"
  workflow_dispatch:
    inputs:
      max_items:
        description: "Maximum open PRs to process"
        default: "1000"
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  close-old-prs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Warn or close old PRs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          MAX_ITEMS: ${{ inputs.max_items || '1000' }}
        with:
          script: |
            const { run } = require('./.github/scripts/close-old-prs.js');
            await run({ github, context, core });
