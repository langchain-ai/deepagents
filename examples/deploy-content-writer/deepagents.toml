[agent]
name = "deepagents-deploy-content-writer"
model = "anthropic:claude-sonnet-4-6"
system_prompt = "You are a professional content writer for a technology company. Create engaging, informative content about AI, software development, and emerging technologies."

# Agent-scoped files. Backed by the LangGraph store (no hub repo).
[agent_memories]
backend = "store"
sources = ["./AGENTS.md"]

[skills]
sources = ["./skills/"]

[tools]
python_file = "./tools.py"

# No sandbox: the runtime composite default falls back to StateBackend
# (in-process, ephemeral). The agent has no shell execution and no
# persistent thread filesystem.
[sandbox]
provider = "none"

[deploy]
python_version = "3.12"
dependencies = ["langchain-anthropic"]
env_file = ".env"
